; PlatformIO Configuration for Speed Limiter System
; Target: ESP32-WROVER-E-N4R8
; Framework: Arduino + ESP-IDF drivers
; Author: Ahmed Ellamie
; Date: January 5th, 2026

[platformio]
default_envs = esp32-wrover-n4r8-pwm

[env]
platform = espressif32
framework = arduino
lib_ldf_mode = deep+
lib_deps =
    https://github.com/collin80/esp32_can.git
    https://github.com/collin80/can_common.git
monitor_filters = esp32_exception_decoder
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.partitions = default.csv

; =============================================================================
; PWM Mode Configuration (Default - Matches SRD Pin Assignment)
; =============================================================================
[env:esp32-wrover-n4r8-pwm]
extends = env
board = esp-wrover-kit
board_build.arduino.memory_type = qio_qspi
build_flags =
    ${env.build_flags}
    -DCORE_DEBUG_PORT=Serial
    -DUSE_DAC_OUTPUT=0
    -DUSE_ALGORITHM_MODULE=0
build_unflags = -std=gnu++11
monitor_speed = 115200
upload_speed = 921600

; =============================================================================
; Logger Firmware Build (OBD speed/RPM + APS1/APS2 stored in Preferences)
; =============================================================================
; Build with:
;   pio run -e esp32-wrover-n4r8-logger
; Usage (USB Serial):
;   type: log  (dumps CSV_START..CSV_END and clears log)
; Notes:
; - Default sample rate is 5Hz (200ms). Storage depends on NVS partition size.
; - If you need more storage, we can add a custom partitions CSV with a bigger NVS.
[env:esp32-wrover-n4r8-logger]
extends = env:esp32-wrover-n4r8-pwm
build_flags =
    ${env:esp32-wrover-n4r8-pwm.build_flags}
    -DBUILD_TEST_LOGGER=1

; =============================================================================
; DAC Mode Configuration (Optional - True Analog on IO25/IO26)
; =============================================================================
[env:esp32-wrover-n4r8-dac]
extends = env
board = esp-wrover-kit
board_build.arduino.memory_type = qio_qspi
build_flags =
    ${env.build_flags}
    -DCORE_DEBUG_PORT=Serial
    -DUSE_DAC_OUTPUT=1
build_unflags = -std=gnu++11
monitor_speed = 115200
upload_speed = 921600

; =============================================================================
; Debug Configuration (with Debug Probe)
; =============================================================================
[env:esp32-wrover-n4r8-pwm-debug]
extends = env:esp32-wrover-n4r8-pwm
build_type = debug
debug_tool = esp-prog
debug_init_break = tbreak setup
; openocd_config = openocd.cfg

; =============================================================================
; MANUAL Mode Configuration (relay on/off only + web UI)
; =============================================================================
[env:esp32-wrover-n4r8-manual]
extends = env:esp32-wrover-n4r8-pwm
build_flags =
    ${env:esp32-wrover-n4r8-pwm.build_flags}
    -DMANUAL=1

